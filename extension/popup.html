<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOJ Algorithm Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>🧠 BOJ Algorithm Helper</h1>
      <p class="subtitle">RAG 기반 알고리즘 분석</p>
    </header>

    <div id="problem-info" class="problem-info hidden">
      <div class="problem-badge">
        <span id="problem-id">문제 번호</span>
      </div>
      <h2 id="problem-title" class="problem-title">문제 제목</h2>
    </div>

    <div id="status-message" class="status-message">
      <p>백준 문제 페이지에서 사용해주세요</p>
    </div>

    <button id="analyze-btn" class="analyze-btn" disabled>
      <span class="btn-icon">🔍</span>
      <span class="btn-text">문제 분석하기</span>
    </button>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>알고리즘을 분석하고 있습니다...</p>
    </div>

    <div id="result" class="result hidden">
      <div class="result-header">
        <h3>📚 알고리즘 분석 결과</h3>
      </div>
      <div id="algorithms" class="algorithms"></div>
      <div class="explanation-section">
        <h4>💡 풀이 접근 방법</h4>
        <div id="explanation" class="explanation"></div>
      </div>
    </div>

    <div id="error" class="error hidden">
      <p id="error-message">오류가 발생했습니다</p>
    </div>

    <footer class="footer">
      <p>Powered by RAG + OpenAI</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
